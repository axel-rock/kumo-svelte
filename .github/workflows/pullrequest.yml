name: Pull Request

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - ".changeset/**"
  # Also trigger on push to PR branches (for bots that push via API)
  push:
    branches:
      - "opencode/**"
    paths-ignore:
      - "*.md"
      - ".changeset/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    timeout-minutes: 2
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/install-dependencies
      - run: pnpm tsx ci/scripts/validate-kumo-svelte-changeset.ts

  build:
    timeout-minutes: 5
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: kumo-svelte-dist
          path: |
            packages/kumo-svelte/dist
            packages/kumo-svelte/ai
            packages/kumo-svelte/.svelte-kit/cloudflare
          retention-days: 1

  lint:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - run: pnpm lint

  typecheck:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - run: pnpm typecheck

  test:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - run: pnpm test

  fidelity:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      # Class-vocabulary parity vs upstream Cloudflare Kumo (deterministic,
      # OS-independent). Pinned to the version the port mirrors.
      - name: Clone upstream Kumo reference
        run: git clone --depth 1 https://github.com/cloudflare/kumo.git ../kumo-upstream-ref
      - name: Fidelity gate
        env:
          KUMO_UPSTREAM: ${{ github.workspace }}/../kumo-upstream-ref
        run: pnpm fidelity:gate
