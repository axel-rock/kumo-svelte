name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build kumo-svelte
        run: pnpm build

      # changesets/action either:
      # 1. Creates/updates a "Version Packages" PR (when changesets exist)
      # 2. Publishes to npm via `pnpm run release` (when Version Packages PR merges)
      # Note: `pnpm run release` runs `pnpm build:all && changeset publish`,
      # which rebuilds kumo-svelte (redundant but harmless). If this becomes slow,
      # consider a publish-only script.
      - name: Create Version PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Publish pkg-pr-new preview for Version Packages PR
      # (GITHUB_TOKEN PRs don't trigger workflows, so we do it here)
      - name: Publish package preview
        if: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: pnpm dlx pkg-pr-new publish --pnpm --compact --no-template ./packages/kumo-svelte
