name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      # npm OIDC trusted publishing requires npm >= 11.5.1. Node 24 can ship an
      # older patch, so pin the CLI explicitly.
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Build kumo-svelte
        run: pnpm build

      # changesets/action either:
      # 1. Creates/updates a "Version Packages" PR (when changesets exist), or
      # 2. Publishes to npm (when that PR merges).
      #
      # Auth is npm OIDC trusted publishing (no NPM_TOKEN). `changeset publish`
      # is invoked directly — NOT through a wrapper like `pnpm run release`
      # (`build && changeset publish`), because a wrapper layer can fail to
      # propagate the OIDC request env vars to the spawned `npm publish`, causing
      # ENEEDAUTH / E404. The build is done in the step above instead.
      - name: Create Version PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Publish pkg-pr-new preview for Version Packages PR
      # (GITHUB_TOKEN PRs don't trigger workflows, so we do it here)
      - name: Publish package preview
        if: ${{ steps.changesets.outputs.pullRequestNumber }}
        continue-on-error: true
        run: pnpm dlx pkg-pr-new publish --pnpm --compact --no-template ./packages/kumo-svelte
